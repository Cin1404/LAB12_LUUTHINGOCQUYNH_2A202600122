services:
  - type: web
    name: ai-agent-production
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: APP_VERSION
        value: "1.0.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: REQUIRE_REDIS
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: agent-cache
          property: connectionString

  - type: redis
    name: agent-cache
    plan: free
    maxmemoryPolicy: allkeys-lru
