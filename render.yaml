services:
  - type: web
    name: lab12-production-agent
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    dockerfilePath: ./06-lab-complete/Dockerfile
    dockerContext: ./06-lab-complete
    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "8000"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: APP_NAME
        value: Production AI Agent
      - key: APP_VERSION
        value: "1.0.0"
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: AGENT_API_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: ESTIMATED_OUTPUT_TOKENS
        value: "120"
      - key: GRACEFUL_SHUTDOWN_TIMEOUT
        value: "30"
      - key: HISTORY_TTL_SECONDS
        value: "604800"
      - key: HISTORY_MAX_MESSAGES
        value: "20"
      - key: REQUIRE_REDIS
        value: "true"
      - key: REDIS_URL
        fromService:
          type: redis
          name: agent-cache
          property: connectionString

  - type: redis
    name: agent-cache
    plan: free
    maxmemoryPolicy: allkeys-lru
